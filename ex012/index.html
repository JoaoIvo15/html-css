<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando Vídeos</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>
        este vídeo está hospedado no meu próprio servidor
    </p>
    <video src="midia/meu-video.mp4" width="500px" controls></video>
    <p>
        este vídeo vem do vimeo!
    </p>
    <iframe title="vimeo-player" src="https://player.vimeo.com/video/1051369991?h=7d9a692c1c" width="640" height="360" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>
    <p>o vídeo abaixo é do youtube</p>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/9qOVlrm3_AE?si=WMDbzeVpgs9vuzi_" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</html>
