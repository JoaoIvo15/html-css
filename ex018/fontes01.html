<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com o Google Fontes</title>
    <style>
        @font-face {
            font-family: 'legal';
            src: url("Round_Monogram_Center.ttf") format('truetype'), url("Round_Monogram_Left.ttf") format('truetype') url("Round_Monogram_Right.ttf") format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body{
            font-family: 'Work Sans', Arial, Verdana, sans-serif;
            font-size: 1em;
        }
        h1{
            font-family: 'legal', sans-serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Olá</h1>
    <p>Lorem amet consectetur adipisicing elit. Inventore consectetur tenetur deserunt dolores omnis rem dolorum, possimus voluptate natus velit, odit nostrum non, modi dicta iusto dignissimos harum delectus? Nobis?</p>

</body>
</html>
